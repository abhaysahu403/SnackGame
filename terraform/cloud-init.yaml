#cloud-config

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - python3-venv
  - python-is-python3
  - docker.io
  - git
  - curl
  - unzip
  - wget

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu
  - mkdir -p /opt/gameapp
  - chown ubuntu:ubuntu /opt/gameapp