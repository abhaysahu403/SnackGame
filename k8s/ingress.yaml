apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gameapp-ingress
  namespace: gameapp

spec:

  ingressClassName: nginx

  rules:

  - host: game.local

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: frontend-service

            port:

              number: 80