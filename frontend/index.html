<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameZone — Snake</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3e;
      --accent: #00ff88;
      --accent2: #ff3366;
      --accent3: #3366ff;
      --text: #e0e0f0;
      --muted: #666680;
      --snake: #00ff88;
      --food: #ff3366;
      --grid: #14141e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND GRID ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── NAVBAR ─── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      letter-spacing: 2px;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    #userBadge {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .btn {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .btn-outline:hover { background: var(--accent); color: var(--bg); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { box-shadow: 0 0 20px var(--accent); transform: translateY(-1px); }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }
    .btn-danger:hover { background: var(--accent2); color: white; }

    /* ─── PAGE SYSTEM ─── */
    .page { display: none; position: relative; z-index: 1; }
    .page.active { display: block; }

    /* ─── AUTH PAGE ─── */
    #authPage {
      display: none;
      min-height: calc(100vh - 57px);
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    #authPage.active { display: flex; }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,255,136,0.05);
    }
    .auth-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 8px;
      text-align: center;
    }
    .auth-sub {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 10px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .tab.active { background: var(--accent); color: var(--bg); }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }

    .error-msg {
      color: var(--accent2);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 18px;
      text-align: center;
    }
    .auth-btn { width: 100%; padding: 12px; font-size: 15px; }

    /* ─── GAME PAGE ─── */
    #gamePage {
      display: none;
      min-height: calc(100vh - 57px);
      padding: 32px 20px;
      align-items: flex-start;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    #gamePage.active { display: flex; }

    .game-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .panel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    /* Score bar */
    .score-bar {
      display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .score-box {
      flex: 1; min-width: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
    }
    .score-box .label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
    }
    .score-box .value {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px; color: var(--accent);
    }

    /* Canvas */
    #gameCanvas {
      display: block;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--grid);
    }

    .game-controls {
      display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap;
    }
    .game-controls .btn { flex: 1; }

    /* Overlay */
    .canvas-wrap {
      position: relative;
      display: inline-block;
    }
    #overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,15,0.88);
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      gap: 12px;
    }
    #overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px; color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
    }
    #overlay p { color: var(--muted); font-size: 14px; }
    #overlay.hidden { display: none; }

    /* Mobile D-pad */
    .dpad {
      display: none;
      margin-top: 16px;
      justify-content: center;
    }
    .dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 50px);
      grid-template-rows: repeat(3, 50px);
      gap: 4px;
    }
    .dpad-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad-btn:active { background: var(--accent); color: var(--bg); }
    @media (max-width: 600px) { .dpad { display: flex; } }

    /* ─── LEADERBOARD ─── */
    .lb-list { min-width: 220px; }
    .lb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank {
      width: 24px; text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--muted);
    }
    .lb-rank.gold { color: #ffd700; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; font-weight: 700; color: var(--text); }
    .lb-score { color: var(--accent); font-weight: 700; }
    .lb-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }

    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px; font-weight: 700;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s;
      z-index: 100;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">🎮 GAMEZONE</div>
  <div class="nav-right">
    <div id="userBadge">👤 <span id="usernameDisplay"></span></div>
    <button class="btn btn-outline" id="loginBtn" onclick="showAuth()">LOGIN</button>
    <button class="btn btn-danger" id="logoutBtn" style="display:none" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<!-- AUTH PAGE -->
<div id="authPage" class="page">
  <div class="auth-card">
    <div class="auth-title">GAMEZONE</div>
    <div class="auth-sub">Sign in to save your scores</div>
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">REGISTER</button>
    </div>

    <!-- Login form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary auth-btn" onclick="doLogin()">LOGIN</button>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="player123" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="min 6 chars" />
      </div>
      <div class="error-msg" id="registerError"></div>
      <button class="btn btn-primary auth-btn" onclick="doRegister()">CREATE ACCOUNT</button>
    </div>

    <p style="text-align:center; margin-top:20px; color:var(--muted); font-size:13px">
      <a href="#" onclick="showGame()" style="color:var(--accent)">Play as Guest →</a>
    </p>
  </div>
</div>

<!-- GAME PAGE -->
<div id="gamePage" class="page">

  <!-- Left: Game -->
  <div class="game-panel">
    <div class="panel-title">🐍 SNAKE</div>
    <div class="score-bar">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="bestDisplay">0</div>
      </div>
      <div class="score-box">
        <div class="label">Level</div>
        <div class="value" id="levelDisplay">1</div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div id="overlay">
        <h2 id="overlayTitle">SNAKE</h2>
        <p id="overlayMsg">Use arrow keys or WASD to move</p>
        <button class="btn btn-primary" onclick="startGame()">▶ START GAME</button>
      </div>
    </div>

    <div class="game-controls">
      <button class="btn btn-outline" onclick="startGame()" id="restartBtn" style="display:none">↺ RESTART</button>
      <button class="btn btn-outline" onclick="togglePause()" id="pauseBtn" style="display:none">⏸ PAUSE</button>
    </div>

    <!-- Mobile D-Pad -->
    <div class="dpad">
      <div class="dpad-grid">
        <div></div>
        <div class="dpad-btn" ontouchstart="setDir('UP')">▲</div>
        <div></div>
        <div class="dpad-btn" ontouchstart="setDir('LEFT')">◀</div>
        <div></div>
        <div class="dpad-btn" ontouchstart="setDir('RIGHT')">▶</div>
        <div></div>
        <div class="dpad-btn" ontouchstart="setDir('DOWN')">▼</div>
        <div></div>
      </div>
    </div>
  </div>

  <!-- Right: Leaderboard -->
  <div class="game-panel lb-list">
    <div class="panel-title">🏆 LEADERBOARD</div>
    <div id="leaderboardList">
      <div class="lb-empty">Loading...</div>
    </div>
    <button class="btn btn-outline" style="width:100%; margin-top:14px; font-size:12px" onclick="loadLeaderboard()">↻ REFRESH</button>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ─── CONFIG ───────────────────────────────────────
  const API = window.API_URL || 'http://localhost:5000';

  // ─── STATE ────────────────────────────────────────
  let token = localStorage.getItem('token') || null;
  let currentUser = JSON.parse(localStorage.getItem('user') || 'null');

  // ─── NAV / AUTH UI ───────────────────────────────
  function updateNav() {
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const badge = document.getElementById('userBadge');
    if (currentUser) {
      loginBtn.style.display = 'none';
      logoutBtn.style.display = '';
      badge.style.display = '';
      document.getElementById('usernameDisplay').textContent = currentUser.username;
    } else {
      loginBtn.style.display = '';
      logoutBtn.style.display = 'none';
      badge.style.display = 'none';
    }
  }

  function showAuth() {
    document.getElementById('authPage').classList.add('active');
    document.getElementById('gamePage').classList.remove('active');
  }
  function showGame() {
    document.getElementById('authPage').classList.remove('active');
    document.getElementById('gamePage').classList.add('active');
    loadLeaderboard();
  }

  function switchTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  }

  function logout() {
    token = null; currentUser = null;
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    updateNav();
    showToast('Logged out');
    showGame();
  }

  // ─── API HELPERS ─────────────────────────────────
  async function apiPost(path, body) {
    const res = await fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
      body: JSON.stringify(body)
    });
    return res.json();
  }
  async function apiGet(path) {
    const res = await fetch(API + path, {
      headers: token ? { Authorization: 'Bearer ' + token } : {}
    });
    return res.json();
  }

  // ─── LOGIN / REGISTER ────────────────────────────
  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    document.getElementById('loginError').textContent = '';
    if (!email || !password) { document.getElementById('loginError').textContent = 'All fields required'; return; }
    try {
      const data = await apiPost('/api/auth/login', { email, password });
      if (data.error) { document.getElementById('loginError').textContent = data.error; return; }
      token = data.token; currentUser = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(currentUser));
      updateNav();
      showToast('Welcome back, ' + currentUser.username + '!');
      showGame();
    } catch { document.getElementById('loginError').textContent = 'Connection error'; }
  }

  async function doRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    document.getElementById('registerError').textContent = '';
    if (!username || !email || !password) { document.getElementById('registerError').textContent = 'All fields required'; return; }
    if (password.length < 6) { document.getElementById('registerError').textContent = 'Password min 6 chars'; return; }
    try {
      const data = await apiPost('/api/auth/register', { username, email, password });
      if (data.error) { document.getElementById('registerError').textContent = data.error; return; }
      token = data.token; currentUser = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(currentUser));
      updateNav();
      showToast('Account created! Welcome, ' + currentUser.username + '!');
      showGame();
    } catch { document.getElementById('registerError').textContent = 'Connection error'; }
  }

  // ─── LEADERBOARD ─────────────────────────────────
  async function loadLeaderboard() {
    const el = document.getElementById('leaderboardList');
    el.innerHTML = '<div class="lb-empty">Loading...</div>';
    try {
      const data = await apiGet('/api/scores/leaderboard/snake');
      if (!data.length) { el.innerHTML = '<div class="lb-empty">No scores yet.<br>Be the first!</div>'; return; }
      const medals = ['gold', 'silver', 'bronze'];
      el.innerHTML = data.map((row, i) => `
        <div class="lb-row">
          <div class="lb-rank ${medals[i] || ''}">${i + 1}</div>
          <div class="lb-name">${row.username}</div>
          <div class="lb-score">${row.best_score}</div>
        </div>
      `).join('');
    } catch { el.innerHTML = '<div class="lb-empty">Failed to load</div>'; }
  }

  // ─── SNAKE GAME ───────────────────────────────────
  const CELL = 20;
  const COLS = 20;
  const ROWS = 20;
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let snake, dir, nextDir, food, score, best, level, speed, gameLoop, paused, running;

  function initGame() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0; level = 1; speed = 150;
    paused = false; running = true;
    best = parseInt(localStorage.getItem('snakeBest') || '0');
    updateHUD();
    placeFood();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function startGame() {
    clearInterval(gameLoop);
    initGame();
    hideOverlay();
    document.getElementById('restartBtn').style.display = '';
    document.getElementById('pauseBtn').style.display = '';
    gameLoop = setInterval(tick, speed);
  }

  function tick() {
    if (paused || !running) return;
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
      // Level up every 50 points
      if (score % 50 === 0) {
        level++;
        speed = Math.max(60, speed - 15);
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
      updateHUD();
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function endGame() {
    running = false;
    clearInterval(gameLoop);
    draw();
    showOverlay('GAME OVER', 'Score: ' + score, true);
    if (currentUser && token && score > 0) {
      apiPost('/api/scores', { game: 'snake', score })
        .then(() => { showToast('Score saved!'); loadLeaderboard(); })
        .catch(() => {});
    }
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
    if (paused) showOverlay('PAUSED', 'Press P or click Resume', false);
    else hideOverlay();
  }

  function updateHUD() {
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('bestDisplay').textContent = best;
    document.getElementById('levelDisplay').textContent = level;
  }

  function showOverlay(title, msg, showBtn) {
    const o = document.getElementById('overlay');
    document.getElementById('overlayTitle').textContent = title;
    document.getElementById('overlayMsg').textContent = msg;
    o.querySelector('.btn').style.display = showBtn ? '' : 'none';
    o.classList.remove('hidden');
  }
  function hideOverlay() {
    document.getElementById('overlay').classList.add('hidden');
  }

  // Drawing
  function draw() {
    ctx.fillStyle = '#0e0e18';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = '#1a1a2e';
    for (let x = 0; x < COLS; x++)
      for (let y = 0; y < ROWS; y++) {
        ctx.beginPath();
        ctx.arc(x * CELL + CELL / 2, y * CELL + CELL / 2, 1, 0, Math.PI * 2);
        ctx.fill();
      }

    // Food
    const fx = food.x * CELL, fy = food.y * CELL;
    ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff3366';
    ctx.beginPath();
    ctx.arc(fx + CELL / 2, fy + CELL / 2, CELL / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const x = seg.x * CELL + 1, y = seg.y * CELL + 1, s = CELL - 2;
      const alpha = i === 0 ? 1 : Math.max(0.3, 1 - i * 0.04);
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = i === 0 ? 12 : 4;
      ctx.fillStyle = i === 0
        ? '#00ff88'
        : `rgba(0, ${Math.floor(180 + 75 * alpha)}, ${Math.floor(100 * alpha)}, ${alpha})`;
      ctx.beginPath();
      ctx.roundRect(x, y, s, s, i === 0 ? 6 : 3);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  // Controls
  function setDir(d) {
    const map = { UP: { x: 0, y: -1 }, DOWN: { x: 0, y: 1 }, LEFT: { x: -1, y: 0 }, RIGHT: { x: 1, y: 0 } };
    const nd = map[d];
    if (nd.x === -dir.x && nd.y === -dir.y) return;
    nextDir = nd;
  }

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
      w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT',
      W: 'UP', S: 'DOWN', A: 'LEFT', D: 'RIGHT'
    };
    if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
    if (e.key === 'p' || e.key === 'P') togglePause();
  });

  // ─── TOAST ───────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  // ─── INIT ────────────────────────────────────────
  updateNav();
  showGame();
  draw(); // draw empty board
</script>
</body>
</html>
